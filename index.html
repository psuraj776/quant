<!DOCTYPE html>
<html>
<head>
  <title>Quant Trainer PRO</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    body { 
      font-family: Arial; 
      text-align: center; 
      margin-top: 10px; 
    } 
    #question { 
      font-size: 26px; 
      margin: 10px; 
    } 
    input, select { 
      padding: 8px; 
      font-size: 16px; 
      margin: 5px; 
    } 
    button {
      padding: 8px 14px;
      margin: 4px;
    }
    .number-box { 
      display: inline-block; 
      padding: 15px; 
      margin: 8px; 
      border: 2px solid #333; 
      cursor: pointer; 
      font-size: 20px; 
      border-radius: 8px; 
      min-width: 60px; 
      line-height: 1.4; 
    } 
    .selected { 
      background: #ddd; 
    } 
    .correct { 
      background: #4CAF50; 
      color: white; 
    } 
    .wrong { 
      background: #f44336; 
      color: white; 
    } 
    .missed { 
      background: #ffc107; 
    } 
    .small { 
      font-size: 14px; 
    } 
    #keypad {
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;              /* reduced */
      max-width: 220px;      /* reduced */
      margin: 10px auto;     /* reduced */
    }
    
    .key {
      height: 45px;          /* was 55px */
      font-size: 18px;       /* slightly smaller */
      border-radius: 8px;
    }

    input {
      font-size: 16px;   /* 🔥 stops iOS zoom */
    }

    #result {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
      min-height: 28px;   /* ✅ reserves space */
      line-height: 28px;  /* ✅ keeps alignment clean */
    }

    #result:empty {
      visibility: hidden;
    }
    
    body {
      font-family: Arial;
      text-align: center;
      margin: 10px;
      overflow-y: auto;
      height: 100vh;
      padding-bottom: 100px; /* ⬅️ increased space */
    }

    button {
      padding: 10px 18px;
      margin: 5px;
      position: relative;
      z-index: 1; /* ensures they stay above layout issues */
    }

  </style>
</head>
<body>

<h2>Quant Practice Trainer</h2>

<label>
  <input type="checkbox" id="patternMode" onchange="handlePatternToggle()"> Pattern Mode
</label>

<label>
  <input type="checkbox" id="gameMode" onchange="handleGameToggle()"> Game Mode
</label>

<br>

<select id="mode">
  <option value="factor">Factor</option>
  <option value="table">Table Practice</option>
  <option value="percent_mix">Percent Mix</option>
  <option value="percent1">1/x</option>
  <option value="percent2">2/x</option>
  <option value="percent3">3/x</option>
  <option value="percent4">4/x</option>
  <option value="percent5">5/x</option>
  <option value="percent6">6/x</option>
  <option value="percent7">7/x</option>
  <option value="percent8">8/x</option>
  <option value="percent9">9/x</option>
  <option value="percent10">10/x</option>
  <option value="consecutive">Consecutive</option>
  <option value="power_mix">Square/Cube Mix</option>
  <option value="square">Square</option>
  <option value="cube">Cube</option>
  <option value="ratio">Ratio</option>
  <option value="mixed">Mixed Simplification</option>
</select>

<select id="direction">
  <option value="forward">Forward</option>
  <option value="reverse">Reverse</option>
</select>

<div id="question"></div>
<p id="timer" style="font-size:20px; color:#cc0000;"></p>
<p id="result"></p>

<div id="gameArea" style="display:none;"></div>

<input id="answer" placeholder="Your answer" readonly inputmode="none"/>

<button id="kbToggle" onclick="toggleKeyboard()">Enable Device Keyboard</button>

<div id="keypad"></div>

<br>

<button onclick="handleSubmit()">Submit</button>
<button onclick="nextQuestion()">Next</button>

<script>

let evaluated=false, answer;
let keyboardEnabled=false;

// ⏱ TIMER
let timerInterval;
let timeLeft = 7;
let timedOut = false;

// -------- TIMER --------
function startTimer(){
  clearInterval(timerInterval);
  timeLeft = 7;
  timedOut = false;
  updateTimer();

  timerInterval = setInterval(()=>{
    timeLeft--;
    updateTimer();

    if(timeLeft<=0){
      clearInterval(timerInterval);
      timedOut = true;
    
      if(gameMode.checked){
        submitGame();   // ✅ auto-evaluate
        result.innerText = "⏱ Time up! Check highlights";
      } else {
        result.style.opacity = 0;
        result.innerText = `⏱ Time up! Correct: ${answer}`;
        setTimeout(()=> result.style.opacity = 1, 50);
      }
    
      evaluated = true;
    }
  },1000);
}

function updateTimer(){
  document.getElementById("timer").innerText = `⏱ ${timeLeft}s`;
}

// -------- HELPERS --------
function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function isPerfectSquare(n){ return Number.isInteger(Math.sqrt(n)); }
function isPerfectCube(n){ return Number.isInteger(Math.cbrt(n)); }
function getConsecutiveBase(n){
  for(let i=1;i<=Math.sqrt(n);i++){
    if(i*(i+1)===n) return i;
  }
  return null;
}

// -------- KEYBOARD --------
function toggleKeyboard(){
  let input=document.getElementById("answer");
  let btn=document.getElementById("kbToggle");

  keyboardEnabled=!keyboardEnabled;

  if(keyboardEnabled){
    input.removeAttribute("readonly");
    input.removeAttribute("inputmode");
    input.focus();
    setTimeout(()=>input.focus(),50);

    btn.innerText="Disable Device Keyboard";
    btn.style.background="#4CAF50";
    btn.style.color="white";
  } else {
    input.setAttribute("readonly",true);
    input.setAttribute("inputmode","none");
    input.blur();

    btn.innerText="Enable Device Keyboard";
    btn.style.background="";
    btn.style.color="";
  }
}

// -------- KEYPAD --------
function renderKeypad(){
  let keys=[
    "1","2","3",
    "4","5","6",
    "7","8","9",
    ".","0","%",
    "*","/","←",
    "C"
  ];
  let kp=document.getElementById("keypad");
  kp.innerHTML="";

  keys.forEach(k=>{
    let btn=document.createElement("div");
    btn.className="key";
    btn.innerText=k;

    btn.onclick=()=>{
      let input=document.getElementById("answer");
      if(k==="C") input.value="";
      else if(k==="←") input.value=input.value.slice(0,-1);
      else input.value+=k;
      input.focus();
    };

    kp.appendChild(btn);
  });
}

// -------- MODE TOGGLE --------
function handleGameToggle(){
  if(gameMode.checked) patternMode.checked=false;
  toggleGameMode();
}
function handlePatternToggle(){
  if(patternMode.checked) gameMode.checked=false;
  toggleGameMode();
}

function toggleGameMode(){
  let game=gameMode.checked;
  let allowed=["square","cube","consecutive"];

  for(let opt of mode.options){
    opt.disabled = game && !allowed.includes(opt.value);
  }

  if(game && !allowed.includes(mode.value)){
    mode.value="square";
  }

  direction.disabled=game;
  generateQuestion();
}

// -------- MAIN --------
function generateQuestion(){
  evaluated=false;
  result.innerText="";

  if(gameMode.checked){
    generateGame();
  
    startTimer();   // ✅ ADD THIS
  
    keypad.style.display="none";
    kbToggle.style.display="none";
    return;
  }

  gameArea.style.display="none";
  answerInput.style.display="inline-block";
  keypad.style.display="grid";
  kbToggle.style.display="inline-block";

  renderKeypad();

  let m=mode.value;
  let dir=direction.value;

  if(m==="square"){
    let n=rand(11,40);
    answer=(dir==="forward")?n*n:n;
    setQ(dir==="forward"?`${n}²=?`:`${n*n}=?`);
  }

  else if(m==="cube"){
    let n=rand(3,20);
    answer=(dir==="forward")?n*n*n:n;
    setQ(dir==="forward"?`${n}³=?`:`${n*n*n}=?`);
  }

  else if(m==="consecutive"){
    let n=rand(5,30);
    answer=(dir==="forward")?n*(n+1):n;
    setQ(dir==="forward"?`${n}×${n+1}=?`:`${n*(n+1)}=?`);
  }

  else if(m==="table"){
    let a=rand(11,40), b=rand(2,10);
    if(dir==="forward"){ answer=a*b; setQ(`${a}×${b}=?`); }
    else { answer=`${a}*${b}`; setQ(`${a*b}=?`); }
  }

  else if(m==="factor"){
    let a=rand(6,30), b=rand(6,30);
    if(dir==="forward"){ answer=a*b; setQ(`${a}×${b}=?`); }
    else { answer=`${a}*${b}`; setQ(`${a*b}=?`); }
  }

  else if(m.startsWith("percent")){
    let num=(m==="percent_mix")?rand(1,10):parseInt(m.replace("percent",""));
    let den=rand(num+1,30);
    let percent=((num/den)*100).toFixed(2);

    if(dir==="forward"){ answer=`${num}/${den}`; setQ(`${percent}%=?`); }
    else { answer=percent; setQ(`${num}/${den}=?%`); }
  }

  else if(m==="mixed"){
    let a=rand(20,100), p=rand(10,50);
    answer=Math.round((p/100)*a);
    setQ(`${p}% of ${a}`);
  }

  answerInput.value="";
  if(!gameMode.checked){
    startTimer();
  }
}

// -------- GAME MODE --------
function generateGame(){
  gameArea.style.display="block";
  answerInput.style.display="none";
  keypad.style.display="none";
  kbToggle.style.display="none";

  result.innerText="";
  gameArea.innerHTML="";

  let m = mode.value;
  let numbers;
  let correctSet = new Set();

  let title="";

  if(m==="square"){
    title="Select PERFECT SQUARES";
  }

  else if(m==="cube"){
    title="Select PERFECT CUBES";
  }

  else if(m==="consecutive"){
    title="Select n × (n+1)";
  }

  setQ(title);

  // ✅ ensure minimum correct answers
  let required = rand(3,5);
  
  while(correctSet.size < required){
    let n;
  
    if(m === "square"){
      n = rand(5,20);
      correctSet.add(n*n);
    }
    else if(m === "cube"){
      n = rand(3,10);
      correctSet.add(n*n*n);
    }
    else if(m === "consecutive"){
      n = rand(3,15);
      correctSet.add(n*(n+1));
    }
  }
  
  numbers = [...correctSet];
  
  // fill remaining random numbers
  while(numbers.length < 12){
    let r = rand(10,300);
    if(!numbers.includes(r)){
      numbers.push(r);
    }
  }

  numbers.sort(()=>Math.random()-0.5);

  numbers.forEach(num=>{
    let div=document.createElement("div");
    div.className="number-box";
    div.innerText=num;

    div.onclick=()=>{
      if(evaluated) return;
      div.classList.toggle("selected");
    };

    gameArea.appendChild(div);
  });

  if(m === "square"){
    answer = new Set(numbers.filter(n => isPerfectSquare(n)));
  }
  else if(m === "cube"){
    answer = new Set(numbers.filter(n => isPerfectCube(n)));
  }
  else if(m === "consecutive"){
    answer = new Set(numbers.filter(n => getConsecutiveBase(n) !== null));
  }
  evaluated=false;
}

function submitGame(){
  if(evaluated) return;

  let boxes=document.querySelectorAll(".number-box");
  let userSet=new Set();

  boxes.forEach(box=>{
    if(box.classList.contains("selected")){
      userSet.add(parseInt(box.innerText));
    }
  });

  boxes.forEach(box=>{
    let val=parseInt(box.innerText);
  
    if(answer.has(val) && userSet.has(val)){
    box.classList.add("correct");
  
    let display = "";
  
    if(mode.value === "square"){
      let root = Math.sqrt(val);
      if(Number.isInteger(root)){
        display = root;
      }
    }
  
    else if(mode.value === "cube"){
      let root = Math.cbrt(val);
      if(Number.isInteger(root)){
        display = root;
      }
    }
  
    else if(mode.value === "consecutive"){
      let base = getConsecutiveBase(val);
      if(base){
        display = `${base} × ${base+1}`;
      }
    }
  
    if(display){
      box.innerHTML = `${val}<div class="small">${display}</div>`;
    }
  } else if(!answer.has(val) && userSet.has(val)){
      // ❌ wrong selection
      box.classList.add("wrong");
  
    } else if(answer.has(val) && !userSet.has(val)){
        box.classList.add("missed");
      
        let display = "";
      
        if(mode.value === "square"){
          let root = Math.sqrt(val);
          if(Number.isInteger(root)){
            display = root;
          }
        }
      
        else if(mode.value === "cube"){
          let root = Math.cbrt(val);
          if(Number.isInteger(root)){
            display = root;
          }
        }
      
        else if(mode.value === "consecutive"){
          let base = getConsecutiveBase(val);
          if(base){
            display = `${base} × ${base+1}`;
          }
        }
      
        if(display){
          box.innerHTML = `${val}<div class="small">${display}</div>`;
        }
      }
  });

  evaluated=true;

  const isCorrect =
    userSet.size === answer.size &&
    [...answer].every(v => userSet.has(v));
  
  if(isCorrect){
    result.innerText = "✅ Correct";
  } else {
    result.innerText = "❌ Try again";
  }
}

// -------- SUBMIT --------
function handleSubmit(){
  if(gameMode.checked) submitGame();
  else checkAnswer();
}

function checkAnswer(){
  if(timedOut && evaluated) return;   // ✅ FIX

  clearInterval(timerInterval);

  let user=answerInput.value.trim();

  if(user==answer){
    result.style.opacity = 0;
    result.innerText="✅ Correct";
    setTimeout(()=> result.style.opacity = 1, 50);
  } else {
    result.style.opacity = 0;
    result.innerText=`❌ Correct: ${answer}`;
    setTimeout(()=> result.style.opacity = 1, 50);
  }

  evaluated = true;
}

// -------- NEXT --------
function nextQuestion(){
  if(!evaluated){
    if(gameMode.checked){
      submitGame();
    } else {
      checkAnswer();
    }
    return;
  }

  clearInterval(timerInterval);
  generateQuestion();
}

// -------- UI --------
let gameMode=document.getElementById("gameMode");
let patternMode=document.getElementById("patternMode");
let mode=document.getElementById("mode");
let direction=document.getElementById("direction");
let gameArea=document.getElementById("gameArea");
let answerInput=document.getElementById("answer");
let result=document.getElementById("result");
let keypad=document.getElementById("keypad");
let kbToggle=document.getElementById("kbToggle");

answerInput.addEventListener("focus", () => {
  if (!keyboardEnabled) {
    answerInput.blur();   // 🚫 stops zoom + keyboard on iPhone
  }
});

function setQ(t){ document.getElementById("question").innerText=t; }

// SAFE INIT
if(!gameMode.checked && !patternMode.checked){
  patternMode.checked = true;
}

toggleGameMode();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log("Service Worker Registered"));
  });
}

</script>

</body>
</html>
